version: "0.1"

server:
  host: 127.0.0.1
  port: 43101

mode: ai-safe

adapters:
  stripe:
    enabled: true
    base_path: /stripe
    scenario: payment_success
    fake_secret: mockport_stripe_secret
    webhook:
      target_url: http://app:3000/webhooks/stripe
      signing_secret: whsec_mockport
  openai:
    enabled: true
    base_path: /openai
    scenario: chat_success
    fake_secret: mockport_openai_key
  zoho-oauth:
    enabled: true
    base_path: /zoho
    scenario: zoho_oauth_success
    fake_secret: mockport_zoho_secret
  github-oauth:
    enabled: true
    base_path: /github
    scenario: oauth_success
    fake_secret: mockport_github_secret
  slack:
    enabled: true
    base_path: /slack
    scenario: message_success
    fake_secret: mockport_slack_token
  line:
    enabled: true
    base_path: /line
    scenario: line_success
    fake_secret: mockport_line_channel_token
    webhook:
      target_url: http://app:3000/webhooks/line
      signing_secret: mockport_line_secret
scenarios:
  payment_success:
    adapter: stripe
    response:
      status: 200
      payment_status: paid
    webhook:
      event: checkout.session.completed

  chat_success:
    adapter: openai
    response:
      status: 200
      object: chat.completion

  payment_failed:
    adapter: stripe
    response:
      status: 402
      error_code: card_declined
    webhook:
      event: payment_intent.payment_failed


  message_success:
    adapter: slack
    response:
      status: 200

  line_success:
    adapter: line
    response:
      status: 200

  zoho_oauth_success:
    adapter: zoho-oauth
    response:
      status: 200
      access_token: mockport_access_token

  oauth_success:
    adapter: github-oauth
    response:
      status: 200
