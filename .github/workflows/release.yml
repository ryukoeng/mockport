name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.4"
      - run: go test ./...
      - run: go vet ./...
      - name: Build archive
        run: scripts/build-release-archives.sh "${GITHUB_REF_NAME#v}" dist "${{ matrix.goos }}" "${{ matrix.goarch }}"
      - uses: actions/upload-artifact@v7
        with:
          name: mockport-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/mockport_*.tar.gz
            dist/checksums.txt

  github-release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
      - name: Merge checksums
        run: |
          find dist -name checksums.txt -exec cat {} + | sort -u > checksums.txt
          find dist -name 'mockport_*.tar.gz' -exec mv {} . \;
      - uses: softprops/action-gh-release@v3
        with:
          files: |
            mockport_*.tar.gz
            checksums.txt
