name: CI

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.4"
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: "contract/sdk/package-lock.json"
      - run: go test ./...
      - run: go vet ./...
      - run: go test -race ./...
      - run: go install honnef.co/go/tools/cmd/staticcheck@v0.7.0
      - run: $(go env GOPATH)/bin/staticcheck ./...
      - run: go install golang.org/x/vuln/cmd/govulncheck@v1.3.0
      - run: $(go env GOPATH)/bin/govulncheck ./...
      - run: go build ./cmd/mockport
      - run: bash scripts/check-go-engineering.sh
      - run: bash scripts/run-sdk-contracts.sh all
      - run: bash scripts/check-public-trust.sh
      - run: bash scripts/check-public-env.sh
      - run: bash scripts/check-distribution.sh
      - run: bash scripts/check-maintenance-policy.sh
