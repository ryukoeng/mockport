name: security

on:
  pull_request:
  push:
  workflow_dispatch:
  schedule:
    - cron: "17 18 * * *"

permissions:
  contents: read

jobs:
  semgrep:
    name: semgrep
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep:1.166.0
    steps:
      - uses: actions/checkout@v6
      - name: Run Semgrep CE
        env:
          SEMGREP_SEND_METRICS: "off"
        run: semgrep scan --config p/golang --error --metrics=off .

  osv:
    name: osv-scanner
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.3.8
    permissions:
      actions: read
      contents: read
    with:
      scan-args: |-
        --lockfile=go.mod
        --lockfile=contract/sdk/package-lock.json
      fail-on-vuln: true

  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: "false"
