name: Feature request
description: Propose an adapter, scenario, workflow, or compatibility improvement
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: input
    id: target_adapter
    attributes:
      label: Target adapter
      description: Name the target adapter for this request.
      placeholder: "stripe, openai, github-oauth, slack, or new adapter"
    validations:
      required: true
  - type: textarea
    id: workflow
    attributes:
      label: Workflow or API surface
      description: Describe the endpoint, SDK call, or workflow you want Mockport to support.
    validations:
      required: true
  - type: textarea
    id: scenario
    attributes:
      label: Scenario
      description: Include success, validation error, auth error, rate limit, state, or webhook behavior.
  - type: textarea
    id: safety_impact
    attributes:
      label: Safety impact
      description: Describe the safety impact for env files, fake credentials, external URLs, or fixtures.
  - type: checkboxes
    id: non_goals
    attributes:
      label: Scope checklist
      options:
        - label: I understand Mockport does not reproduce provider internals or undocumented behavior.
          required: true
