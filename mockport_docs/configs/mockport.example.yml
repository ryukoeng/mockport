version: "0.1"

server:
  host: 127.0.0.1
  port: 43101

mode: ai-safe

adapters:
  stripe:
    enabled: true
    base_path: /stripe
    scenario: payment_success
    fake_secret: mockport_stripe_secret
    webhook:
      target_url: http://app:3000/webhooks/stripe
      signing_secret: whsec_mockport

scenarios:
  payment_success:
    adapter: stripe
    response:
      status: 200
      payment_status: paid
    webhook:
      event: checkout.session.completed

  payment_failed:
    adapter: stripe
    response:
      status: 402
      error_code: card_declined
    webhook:
      event: payment_intent.payment_failed
