subscription_only: true
provider: codex-cli
base_branch: main
branch_name_strategy: romaji
auto_pr: true
draft_pr: false
allowed_providers:
  - codex-cli
  - cursor-cli
  - opencode
  - opencode-cli
  - agy-cli
  - mock
forbidden_providers:
  - codex
  - claude-sdk

workflow_command_gates:
  custom_scripts: true

provider_routing:
  personas:
    planner:
      provider: codex-cli
      model: gpt-5.5-extra-high
    coder:
      provider: cursor-cli
      model: composer-2.5
    lightweight-fixer:
      provider: opencode-cli
      model: opencode-go/minimax-m3
    reviewer:
      provider: agy-cli
      model: "Gemini 3.5 Flash (High)"
    coding-reviewer:
      provider: agy-cli
      model: "Gemini 3.5 Flash (High)"
    hygiene-reviewer:
      provider: opencode-cli
      model: opencode-go/minimax-m3
    security-reviewer:
      provider: agy-cli
      model: "Gemini 3.5 Flash (High)"
    supervisor:
      provider: codex-cli
      model: gpt-5.5-extra-high
  tags:
    planning:
      provider: codex-cli
      model: gpt-5.5-extra-high
    implementation:
      provider: cursor-cli
      model: composer-2.5
    edit:
      provider: cursor-cli
      model: composer-2.5
    verification:
      provider: opencode-cli
      model: opencode-go/minimax-m3
    review:
      provider: agy-cli
      model: "Gemini 3.5 Flash (High)"
    security:
      provider: agy-cli
      model: "Gemini 3.5 Flash (High)"
  steps:
    plan:
      provider: codex-cli
      model: gpt-5.5-extra-high
    implement:
      provider: cursor-cli
      model: composer-2.5
    cheap_fix:
      provider: opencode-cli
      model: opencode-go/minimax-m3
    review:
      provider: agy-cli
      model: "Gemini 3.5 Flash (High)"
    agy-mergeability-review:
      provider: agy-cli
      model: "Gemini 3.5 Flash (High)"
    opencode-hygiene-review:
      provider: opencode-cli
      model: opencode-go/minimax-m3
    final_arbitration:
      provider: codex-cli
      model: gpt-5.5-extra-high
